      theme: {
        extend: {

  <style>
    /* Custom Scrollbar Styles */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.2);
    }
    
    .glow-card {
      position: relative;
    }
    .glow-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>
</head>

    // ==========================================
    // AGENT CONFIGURATIONS & SYSTEM TEMPLATES

    const AGENT_CONFIGS = {

        systemInstruction: `You are the WriCoRe Writing Agent, a master copywriter and editorial expert. 
Your goal is to draft copy with immaculate structure, elegance, and tone alignment. 
- Use formatting (bolding, clean lists, headers) to make writing highly legible.
- Keep responses tailored to the desired formatting (emails, essays, reports, blog posts).
- Maintain an inspiring, constructive, and articulate voice.`,
        color: '#00d4ff',
        glowColor: 'rgba(0, 212, 255, 0.12)',
        emptyStateIcon: <PenToolIcon className="w-8 h-8 text-[#00d4ff]" />,

        color: '#a78bfa',
        glowColor: 'rgba(167, 139, 250, 0.12)',

        systemInstruction: `You are the WriCoRe Research Agent, a meticulous and objective senior research analyst.
- Use facts and logical synthesis to formulate thorough, deeply structured reports.
- Use Markdown headers, tables, bulleted lists, and blockquotes for scientific presentation.
- Focus on logical, structural, and factual depth. Organize complex theories systematically.`,
        color: '#34d399',

        emptyStateIcon: <SearchIcon className="w-8 h-8 text-[#34d399]" />,
        suggestions: [
          "Compare the architectural trade-offs of Monoliths vs Microservices",

    };

    // Models mapping for OpenRouter models (UP-TO-DATE FOR 2026)
    const OPENROUTER_MODELS = [
      { id: 'openrouter/free', name: 'Auto-Select Router (Smart Free Fallback)' },
      { id: 'moonshotai/kimi-k2.6:free', name: 'Kimi K2.6 MoE (Free Reasoning & Vision)' },
      { id: 'openai/gpt-oss-120b:free', name: 'OpenAI GPT-OSS 120B (Free MoE)' },
      { id: 'meta-llama/llama-3.3-70b-instruct:free', name: 'Llama 3.3 70B (Free SOTA Flagship)' },
      { id: 'google/gemma-4-31b-it:free', name: 'Gemma 4 31B (Free Google Multimodal)' },
      { id: 'qwen/qwen3-coder:free', name: 'Qwen 3 Coder (Free Coding Specialist)' },
      { id: 'z-ai/glm-4.5-air:free', name: 'GLM 4.5 Air (Free MoE Agent Specialist)' }
    ];

    // Models mapping for Groq (UP-TO-DATE FOR 2026)
    const GROQ_MODELS = [
      { id: 'llama-3.3-70b-versatile', name: 'Llama 3.3 70B (Versatile/Standard)' },
      { id: 'llama-3.1-8b-instant', name: 'Llama 3.1 8B (Sub-second / 840+ TPS)' },

      { id: 'qwen/qwen3-32b', name: 'Qwen 3 32B (Logical Reasoning & Development)' }
    ];

    // Models mapping for GitHub Models (UP-TO-DATE FOR 2026)
    const GITHUB_MODELS = [
      { id: 'gpt-5-chat', name: 'GPT-5 Chat (Preview Frontier)' },
      { id: 'gpt-5-nano', name: 'GPT-5 Nano (Ultra-Low Latency)' },
      { id: 'o4-mini', name: 'o4-mini (Next-Gen Reasoning)' },

      { id: 'meta-llama-3.3-70b-instruct', name: 'Llama 3.3 70B (SOTA Balanced)' }
    ];

    // ==========================================
    // MAIN REACT APPLICATION ENTRY POINT
    // ==========================================
    function App() {
      const [activeAgent, setActiveAgent] = React.useState('write');
      const [messages, setMessages] = React.useState({
        write: [],
        code: [],
        research: []
      });
      const [userInput, setUserInput] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);
      const [errorMsg, setErrorMsg] = React.useState(null);
      const [isModalOpen, setIsModalOpen] = React.useState(false);
      
      const [isSpeaking, setIsSpeaking] = React.useState(null);
      const [feedbacks, setFeedbacks] = React.useState({}); // format: { messageIndex: 'like' | 'dislike' }
      
      // Multi-API Settings
      const [apiProvider, setApiProvider] = React.useState('gemini'); // 'gemini', 'openrouter', 'groq', 'github'
      const [apiKey, setApiKey] = React.useState('');
      const [openRouterModel, setOpenRouterModel] = React.useState('openrouter/free');
      const [groqModel, setGroqModel] = React.useState('llama-3.3-70b-versatile');
      const [githubModel, setGithubModel] = React.useState('gpt-5-chat');
      const [isConnected, setIsConnected] = React.useState(false);

      const [isGuideOpen, setIsGuideOpen] = React.useState(false);
      const [copiedIndex, setCopiedIndex] = React.useState(null);

      const chatEndRef = React.useRef(null);
      const textareaRef = React.useRef(null);

      // Auto scroll chat
      React.useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isLoading, activeAgent]);

      // Adjust height of textarea dynamically
      React.useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = `${Math.min(textareaRef.current.scrollHeight, 180)}px`;
        }
      }, [userInput]);

      React.useEffect(() => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
        setIsSpeaking(null);
      }, [activeAgent]);

      const handleSpeak = (text, idx) => {
        if ('speechSynthesis' in window) {
          if (isSpeaking === idx) {
            window.speechSynthesis.cancel();
            setIsSpeaking(null);
          } else {
            window.speechSynthesis.cancel();
            // Format TTS input: clean out backticks and raw markdown syntax
            const cleanText = text.replace(/```[\s\S]*?```/g, '[Code block content omitted from speech]').replace(/[*#`>]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.onend = () => setIsSpeaking(null);
            utterance.onerror = () => setIsSpeaking(null);
            window.speechSynthesis.speak(utterance);
            setIsSpeaking(idx);
          }
        } else {
          setErrorMsg("Audio Speak synthesis is not supported on your current browser framework.");
        }
      };

      const handleExportDocs = (text, idx) => {
        try {
          const blob = new Blob([text], { type: "text/markdown;charset=utf-8;" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.setAttribute("download", `wricore_agent_response_${idx}.md`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } catch (err) {
          setErrorMsg("Export Docs failed to download: " + err.message);
        }
      };

      const handleDraftGmail = (text) => {
        const textSnippet = text.length > 2500 ? text.substring(0, 2500) + "\n\n... [Truncated for link limitations]" : text;
        const mailto = `https://mail.google.com/mail/?view=cm&fs=1&body=${encodeURIComponent(textSnippet)}`;
        window.open(mailto, '_blank');
      };

      const handleBranchChat = (idx) => {
        setMessages(prev => {
          const branchedHistory = prev[activeAgent].slice(0, idx + 1);
          return {
            ...prev,
            [activeAgent]: branchedHistory
          };
        });
      };

      const handleToggleFeedback = (idx, type) => {
        setFeedbacks(prev => {
          const key = `${activeAgent}_${idx}`;
          const current = prev[key];
          return {
            ...prev,
            [key]: current === type ? null : type // Toggle on/off
          };
        });
      };

      // Fetch settings on load
      React.useEffect(() => {
        const savedProvider = localStorage.getItem('wricore_provider');
        const savedKey = localStorage.getItem('wricore_key');
        const savedORModel = localStorage.getItem('wricore_or_model');
        const savedGroqModel = localStorage.getItem('wricore_groq_model');
        const savedGHModel = localStorage.getItem('wricore_gh_model');
        
        if (savedProvider) setApiProvider(savedProvider);
        if (savedKey) {
          setApiKey(savedKey);
          setIsConnected(true);
        }
        if (savedORModel) setOpenRouterModel(savedORModel);
        if (savedGroqModel) {
          // Fallback logic for deprecated models
          if (savedGroqModel === 'mixtral-8x7b-32768' || savedGroqModel === 'gemma2-9b-it') {
            setGroqModel('llama-3.3-70b-versatile');
          } else {
            setGroqModel(savedGroqModel);
          }
        }
        if (savedGHModel) setGithubModel(savedGHModel);
      }, []);

      const agent = AGENT_CONFIGS[activeAgent];

      // ==========================================
      // SIMPLE CLIENT-SIDE MARKDOWN RENDER COMPILER
      // ==========================================
      const renderMessageContent = (text) => {
        if (!text) return null;
        const parts = text.split(/(```[\s\S]*?```)/g);
        
        return parts.map((part, index) => {
          if (part.startsWith('```') && part.endsWith('```')) {
            const match = part.match(/```(\w*)\n([\s\S]*?)```/);
            const language = match ? match[1] : 'code';
            const codeText = match ? match[2].trim() : part.slice(3, -3).trim();
            
            return (
              <div key={index} className="my-3 border border-gray-800 rounded-lg overflow-hidden bg-[#0d1520] font-mono text-xs sm:text-sm">
                <div className="flex items-center justify-between px-4 py-1.5 bg-[#162030] border-b border-gray-800 text-[#8b9ab5]">
                  <span className="uppercase text-[10px] tracking-wider font-semibold font-sans text-[#00d4ff]">{language || 'code'}</span>
                  <button 
                    type="button"
                    onClick={() => handleCopyText(codeText, index)}
                    className="flex items-center gap-1.5 py-0.5 px-2 rounded hover:bg-gray-700 transition-colors text-xs"
                  >
                    {copiedIndex === index ? (
                      <React.Fragment>
                        <CheckIcon className="w-3.5 h-3.5 text-[#34d399]" />
                        <span className="text-[#34d399]">Copied</span>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <CopyIcon className="w-3.5 h-3.5" />
                        <span>Copy</span>
                      </React.Fragment>
                    )}
                  </button>
                </div>
                <pre className="p-4 overflow-x-auto text-gray-200 whitespace-pre-wrap break-all leading-relaxed">
                  <code>{codeText}</code>
                </pre>
              </div>
            );
          } else {
            const lines = part.split('\n');
            return (
              <div key={index} className="space-y-2 leading-relaxed text-gray-200">
                {lines.map((line, lineIdx) => {
                  if (line.startsWith('### ')) {
                    return <h3 key={lineIdx} className="text-base font-bold mt-4 mb-2 text-white flex items-center gap-2"><SparklesIcon className="w-3.5 h-3.5 text-[#00d4ff]" />{line.substring(4)}</h3>;
                  }
                  if (line.startsWith('## ')) {
                    return <h2 key={lineIdx} className="text-lg font-bold mt-4 mb-2 text-white border-b border-gray-800 pb-1">{line.substring(3)}</h2>;
                  }
                  if (line.startsWith('# ')) {
                    return <h1 key={lineIdx} className="text-xl font-extrabold mt-5 mb-2 text-white">{line.substring(2)}</h1>;
                  }
                  
                  if (line.trim().startsWith('- ') || line.trim().startsWith('* ')) {
                    const content = line.trim().substring(2);
                    return (
                      <ul key={lineIdx} className="list-disc pl-5 my-1 text-gray-300">
                        <li>{parseInlineMarkdown(content)}</li>
                      </ul>
                    );
                  }

                  const numListMatch = line.trim().match(/^(\d+)\.\s(.*)/);
                  if (numListMatch) {
                    return (
                      <ol key={lineIdx} className="list-decimal pl-5 my-1 text-gray-300">
                        <li>{parseInlineMarkdown(numListMatch[2])}</li>
                      </ol>
                    );
                  }

                  if (line.trim().startsWith('> ')) {
                    return (
                      <blockquote key={lineIdx} className="border-l-3 border-[#00d4ff] pl-3 py-1 my-2 bg-gray-900/40 rounded-r text-[#8b9ab5] italic">
                        {parseInlineMarkdown(line.trim().substring(2))}
                      </blockquote>
                    );
                  }

                  return line.trim() ? (
                    <p key={lineIdx} className="my-1 text-[14.5px]">{parseInlineMarkdown(line)}</p>
                  ) : (
                    <div key={lineIdx} className="h-2" />
                  );
                })}
              </div>
            );
          }
        });
      };

      const parseInlineMarkdown = (text) => {
        const elements = [];
        let key = 0;
        const boldRegex = /\*\*([^*]+)\*\*/g;
        const inlineCodeRegex = /`([^`]+)`/g;

        const allMatches = [
          ...[...text.matchAll(boldRegex)].map(m => ({ type: 'bold', start: m.index, end: m.index + m[0].length, content: m[1] })),
          ...[...text.matchAll(inlineCodeRegex)].map(m => ({ type: 'code', start: m.index, end: m.index + m[0].length, content: m[1] }))
        ].sort((a, b) => a.start - b.start);

        let currentIndex = 0;
        allMatches.forEach((match) => {
          if (match.start >= currentIndex) {
            if (match.start > currentIndex) {
              elements.push(<span key={key++}>{text.substring(currentIndex, match.start)}</span>);
            }
            if (match.type === 'bold') {
              elements.push(<strong key={key++} className="font-semibold text-white">{match.content}</strong>);
            } else if (match.type === 'code') {
              elements.push(
                <code key={key++} className="px-1.5 py-0.5 rounded bg-white/10 font-mono text-[12px] text-[#00d4ff]">
                  {match.content}
                </code>
              );
            }
            currentIndex = match.end;
          }
        });

        if (currentIndex < text.length) {
          elements.push(<span key={key++}>{text.substring(currentIndex)}</span>);
        }
        return elements.length > 0 ? elements : text;
      };

      const handleCopyText = (text, index) => {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          document.execCommand('copy');
          document.body.removeChild(textArea);
          setCopiedIndex(index);
          setTimeout(() => setCopiedIndex(null), 2000);
        } catch (err) {
          console.error("Copy failed: ", err);
        }
      };

      // ==========================================
      // ADAPTIVE MULTI-API CHAT HANDLER WITH DYNAMIC DATE
      // ==========================================
      const handleSendMessage = async (e, suggestedPrompt = null) => {
        if (e) e.preventDefault();
        const promptToSend = suggestedPrompt || userInput;
        if (!promptToSend.trim() || isLoading) return;

        if (!isConnected || !apiKey) {
          setErrorMsg("Please connect your API Key first! Click 'Connect' in the top right to configure your API Provider.");
          setIsLoading(false);
          return;
        }

        const userMessage = {
          role: 'user',
          content: promptToSend,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        setMessages(prev => ({
          ...prev,
          [activeAgent]: [...prev[activeAgent], userMessage]
        }));

        if (!suggestedPrompt) setUserInput('');
        setIsLoading(true);
        setErrorMsg(null);

        let url = "";
        let headers = { 'Content-Type': 'application/json' };
        let bodyPayload = {};

        // DYNAMIC TEMPORAL ANCHOR INJECTION logic to bypass LLM pre-training date cutoff limits
        const currentLiveDate = new Date().toDateString();
        const anchoredSystemInstruction = `${agent.systemInstruction}\n\n[CRITICAL TEMPORAL ANCHOR: The actual current calendar date is ${currentLiveDate}. You must strictly use this current date for any dates, reports, analyses, metadata generation, or timelines. Do not assume or hallucinate previous years.]`;

        // Build Payload depending on active LLM API provider
        if (apiProvider === 'gemini') {
          // Stable Gemini 3.5 Flash
          url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
          
          const historyPayload = messages[activeAgent].map(msg => ({
            role: msg.role === 'user' ? 'user' : 'model',
            parts: [{ text: msg.content }]
          }));
          historyPayload.push({
            role: 'user',
            parts: [{ text: promptToSend }]
          });

          bodyPayload = {
            contents: historyPayload,
            systemInstruction: {
              parts: [{ text: anchoredSystemInstruction }]
            }
          };
          if (activeAgent === 'research') {
            bodyPayload.tools = [{ google_search: {} }];
          }

        } else if (apiProvider === 'openrouter') {
          url = "https://openrouter.ai/api/v1/chat/completions";
          headers['Authorization'] = `Bearer ${apiKey}`;
          headers['HTTP-Referer'] = window.location.href || 'http://localhost';
          headers['X-Title'] = 'WriCoRe AI Workspace';

          const historyPayload = messages[activeAgent].map(msg => ({
            role: msg.role === 'user' ? 'user' : 'assistant',
            content: msg.content
          }));
          historyPayload.push({
            role: 'user',
            content: `${anchoredSystemInstruction}\n\nUser request: ${promptToSend}`
          });

          bodyPayload = {
            model: openRouterModel,
            messages: historyPayload
          };

        } else if (apiProvider === 'groq') {
          url = "https://api.groq.com/openai/v1/chat/completions";
          headers['Authorization'] = `Bearer ${apiKey}`;

          const historyPayload = messages[activeAgent].map(msg => ({
            role: msg.role === 'user' ? 'user' : 'assistant',
            content: msg.content
          }));
          historyPayload.push({
            role: 'user',
            content: `${anchoredSystemInstruction}\n\nUser request: ${promptToSend}`
          });

          bodyPayload = {
            model: groqModel,
            messages: historyPayload
          };

        } else if (apiProvider === 'github') {
          url = "https://models.inference.ai.azure.com/chat/completions";
          headers['Authorization'] = `Bearer ${apiKey}`;

          const historyPayload = messages[activeAgent].map(msg => ({
            role: msg.role === 'user' ? 'user' : 'assistant',
            content: msg.content
          }));
          historyPayload.push({
            role: 'user',
            content: `${anchoredSystemInstruction}\n\nUser request: ${promptToSend}`
          });

          bodyPayload = {
            model: githubModel,
            messages: historyPayload
          };
        }

        let attempt = 0;
        const maxRetries = 3;
        let success = false;
        let responseData = null;

        while (attempt < maxRetries && !success) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: headers,
              body: JSON.stringify(bodyPayload)
            });

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error?.message || `HTTP ${response.status}`);
            }

            responseData = await response.json();
            success = true;
          } catch (err) {
            attempt++;
            if (attempt >= maxRetries) {
              setErrorMsg(`API request failed after ${maxRetries} tries: ${err.message}. Check your configuration and connectivity.`);
              setIsLoading(false);
              return;
            }
            const delay = Math.pow(2, attempt - 1) * 1000;
            await new Promise(resolve => setTimeout(resolve, delay));
          }
        }

        try {
          let assistantText = "";
          
          if (apiProvider === 'gemini') {
            const candidate = responseData?.candidates?.[0];
            assistantText = candidate?.content?.parts?.[0]?.text;
            
            // Handle optional Google grounding references
            const sources = candidate?.groundingMetadata?.groundingAttributions;
            if (sources && sources.length > 0) {
              assistantText += "\n\n### Grounding Sources & References\n";
              sources.forEach((source, sIdx) => {
                if (source.web?.uri) {
                  assistantText += `${sIdx + 1}. [${source.web.title || source.web.uri}](${source.web.uri})\n`;
                }
              });
            }
          } else {
            // Standard OpenAI format fallback (handles OpenRouter, Groq, and GitHub Models)
            assistantText = responseData?.choices?.[0]?.message?.content;
          }

          if (assistantText) {
            const aiMessage = {
              role: 'model',
              content: assistantText,
              timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            setMessages(prev => ({
              ...prev,
              [activeAgent]: [...prev[activeAgent], aiMessage]
            }));
          } else {
            throw new Error("Received empty token/text payload from API.");
          }
        } catch (err) {
          setErrorMsg("Error parsing response payload: " + err.message);
        } finally {
          setIsLoading(false);
        }
      };

      const handleClearChat = () => {
        setMessages(prev => ({ ...prev, [activeAgent]: [] }));
        setErrorMsg(null);
      };

      const handleSaveConfig = () => {
        if (!apiKey.trim()) {
          setErrorMsg("Please enter a valid API key credential.");
          return;
        }

        // Standard prefix verifications for quality guardrails
        if (apiProvider === 'gemini' && !apiKey.startsWith('AIzaSy')) {
          setErrorMsg("Format mismatch: Google Gemini API keys start with 'AIzaSy'.");
          return;
        }
        if (apiProvider === 'openrouter' && !apiKey.startsWith('sk-or-')) {
          setErrorMsg("Format mismatch: OpenRouter API credentials start with 'sk-or-'.");
          return;
        }
        if (apiProvider === 'groq' && !apiKey.startsWith('gsk_')) {
          setErrorMsg("Format mismatch: Groq API credentials start with 'gsk_'.");
          return;
        }
        if (apiProvider === 'github' && !apiKey.startsWith('ghp_') && !apiKey.startsWith('github_pat_')) {
          setErrorMsg("Format mismatch: GitHub Personal Access Tokens should start with 'github_pat_' or 'ghp_'.");
          return;
        }

        localStorage.setItem('wricore_provider', apiProvider);
        localStorage.setItem('wricore_key', apiKey.trim());
        localStorage.setItem('wricore_or_model', openRouterModel);
        localStorage.setItem('wricore_groq_model', groqModel);
        localStorage.setItem('wricore_gh_model', githubModel);
        
        setIsConnected(true);
        setIsModalOpen(false);
        setErrorMsg(null);
      };

      const handleClearConfig = () => {
        localStorage.removeItem('wricore_provider');
        localStorage.removeItem('wricore_key');
        localStorage.removeItem('wricore_or_model');
        localStorage.removeItem('wricore_groq_model');
        localStorage.removeItem('wricore_gh_model');

        setIsConnected(false);
        setErrorMsg(null);

      return (
        <div className="relative flex flex-col flex-1 h-screen max-h-screen">

          <header className="flex items-center justify-between py-4 border-b border-white/5 flex-shrink-0 relative z-10">

                <span className="text-[#00d4ff]">W</span>

                <span className="text-[#a78bfa]">C</span>

                  Multi-LLM v2.6

              >
                <TrashIcon className="w-3.5 h-3.5" />
                <span className="hidden sm:inline">Clear Chat</span>
              </button>

              <button 
                type="button"
                onClick={() => setIsModalOpen(true)}
                className={`flex items-center gap-2 px-3 py-1.5 border rounded-lg text-xs font-medium transition-all ${
                  isConnected 
                    ? 'bg-emerald-500/10 text-[#34d399] border-emerald-500/20 hover:bg-emerald-500/20' 
                    : 'bg-white/5 text-[#00d4ff] border-white/10 hover:border-[#00d4ff]/30'
                }`}
              >
                <span className={`w-1.5 h-1.5 rounded-full ${isConnected ? 'bg-[#34d399] animate-pulse' : 'bg-[#00d4ff]'}`} />
                <span className="font-mono text-[11px] font-semibold uppercase">{isConnected ? 'Connected' : 'Connect API'}</span>
                <KeyIcon className="w-3.5 h-3.5" />
              </button>
            </div>
          </header>

          {/* THREE AGENT TABS */}
          <nav className="grid grid-cols-3 gap-2 py-4 flex-shrink-0" role="tablist">
            {Object.keys(AGENT_CONFIGS).map((key) => {
              const cfg = AGENT_CONFIGS[key];
              const isSelected = activeAgent === key;
              return (
                <button
                  key={key}
                  type="button"
                  onClick={() => {
                    setActiveAgent(key);
                    setErrorMsg(null);
                  }}
                  className={`flex flex-col sm:flex-row items-center justify-center gap-2 p-3 sm:py-3.5 sm:px-4 rounded-xl border text-center transition-all ${
                    isSelected ? 'text-white' : 'bg-[#111827]/40 border-white/5 text-[#8b9ab5] hover:border-white/10'
                  }`}
                  style={{
                    borderColor: isSelected ? cfg.color : '',
                    backgroundColor: isSelected ? cfg.glowColor : '',
                    boxShadow: isSelected ? `0 4px 20px -8px ${cfg.color}` : ''
                  }}
                >
                  {cfg.id === 'write' && <PenToolIcon className="w-5 h-5" style={{ color: isSelected ? cfg.color : '' }} />}
                  {cfg.id === 'code' && <Code2Icon className="w-5 h-5" style={{ color: isSelected ? cfg.color : '' }} />}
                  {cfg.id === 'research' && <SearchIcon className="w-5 h-5" style={{ color: isSelected ? cfg.color : '' }} />}
                  <span className="text-xs sm:text-sm font-semibold tracking-wide">{cfg.name}</span>
                </button>
              );
            })}
          </nav>

          {/* AGENT BADGE & DESC */}
          <div className="flex items-center gap-3 p-3 bg-[#162030]/60 border border-white/5 rounded-xl text-xs sm:text-sm text-[#8b9ab5] flex-shrink-0">
            <span 
              className="font-mono font-bold tracking-wider px-2 py-0.5 rounded text-[10px]" 
              style={{ 
                backgroundColor: `${agent.color}15`, 
                color: agent.color,
                border: `1px solid ${agent.color}30`
              }}
            >
              {agent.badge}
            </span>
            <span className="truncate">{agent.description}</span>
          </div>

          {/* SYSTEM ALERTS */}
          {errorMsg && (
            <div className="mt-3 flex items-start gap-2.5 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-xs sm:text-sm text-red-300 animate-fadeIn">
              <AlertCircleIcon className="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" />
              <div className="flex-1">
                <span className="font-bold">System Alert:</span> {errorMsg}
              </div>
              <button type="button" onClick={() => setErrorMsg(null)} className="text-red-400 hover:text-white font-bold ml-1">×</button>
            </div>
          )}

          {/* MAIN CHAT AREA */}
          <main className="flex-1 overflow-y-auto my-3 pr-1 space-y-4 min-h-0 flex flex-col relative z-10">
            {messages[activeAgent].length === 0 ? (
              
              /* EMPTY CHAT SHELL */
              <div className="flex-1 flex flex-col items-center justify-center py-8 text-center my-auto">
                <div 
                  className="w-16 h-16 rounded-2xl flex items-center justify-center mb-4 border transition-all"
                  style={{
                    borderColor: `${agent.color}30`,
                    backgroundColor: `${agent.color}10`,
                    boxShadow: `0 8px 24px -10px ${agent.color}`
                  }}
                >
                  {agent.emptyStateIcon}
                </div>
                <h2 className="text-xl font-bold text-white mb-1">{agent.name} ({apiProvider.toUpperCase()} Mode)</h2>
                <p className="text-[#8b9ab5] text-sm max-w-sm mb-6 leading-relaxed">
                  {agent.tagline}. Pick a prompt template below or start messaging.
                </p>

                <div className="w-full max-w-lg grid grid-cols-1 gap-2.5">
                  {agent.suggestions.map((suggestion, idx) => (
                    <button
                      key={idx}
                      type="button"
                      onClick={() => handleSendMessage(null, suggestion)}
                      className="p-3 text-left bg-[#111827]/40 hover:bg-[#1a2235]/60 border border-white/5 hover:border-[#00d4ff]/20 rounded-xl text-xs sm:text-sm text-[#8b9ab5] hover:text-white transition-all flex items-center justify-between group"
                    >
                      <span className="line-clamp-1 pr-4">{suggestion}</span>
                      <ArrowUpRightIcon className="w-4 h-4 text-gray-500 group-hover:text-[#00d4ff] flex-shrink-0" />
                    </button>
                  ))}
                </div>
              </div>
            ) : (
              
              /* ACTIVE MESSAGES STREAM */
              <div className="space-y-4 pb-2">
                {messages[activeAgent].map((msg, idx) => {
                  const feedbackKey = `${activeAgent}_${idx}`;
                  const currentFeedback = feedbacks[feedbackKey];

                  return (
                    <div 
                      key={idx} 
                      className={`flex gap-3 max-w-[85%] ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : 'mr-auto'}`}
                    >
                      <div 
                        className={`w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center font-mono text-[11px] font-bold border ${
                          msg.role === 'user' ? 'bg-[#1a2235] border-white/10 text-[#8b9ab5]' : 'bg-[#111827] border-white/5'
                        }`}
                        style={{
                          borderColor: msg.role === 'model' ? `${agent.color}25` : '',
                          color: msg.role === 'model' ? agent.color : ''
                        }}
                      >
                        {msg.role === 'user' ? 'ME' : 'AI'}
                      </div>

                      <div className="space-y-1">
                        <div 
                          className={`p-4 rounded-2xl text-[14.5px] leading-relaxed border ${
                            msg.role === 'user'
                              ? 'bg-[#1a2235]/40 border-white/5 text-gray-100 rounded-tr-sm'
                              : 'bg-[#111827]/80 border-white/5 text-gray-200 rounded-tl-sm'
                          }`}
                        >
                          {msg.role === 'user' ? (
                            <p className="whitespace-pre-wrap">{msg.content}</p>
                          ) : (
                            renderMessageContent(msg.content)
                          )}
                        </div>

                        {/* UTILITY BAR WITH ADAPTIVE COPY & THUMBS */}
                        {msg.role === 'model' && (
                          <div className="flex flex-wrap items-center gap-1.5 pt-1 text-[11px] text-[#8b9ab5] animate-fadeIn">
                            {/* Like (Thumbs Up) */}
                            <button 
                              type="button"
                              onClick={() => handleToggleFeedback(idx, 'like')}
                              className={`flex items-center justify-center p-1.5 rounded transition-all ${
                                currentFeedback === 'like' ? 'bg-[#34d399]/20 text-[#34d399]' : 'bg-white/5 hover:bg-white/10 hover:text-white'
                              }`}
                              title="Like response"
                            >
                              <ThumbsUpIcon className="w-3.5 h-3.5" />
                            </button>

                            {/* Dislike (Thumbs Down) */}
                            <button 
                              type="button"
                              onClick={() => handleToggleFeedback(idx, 'dislike')}
                              className={`flex items-center justify-center p-1.5 rounded transition-all ${
                                currentFeedback === 'dislike' ? 'bg-red-500/20 text-red-400' : 'bg-white/5 hover:bg-white/10 hover:text-white'
                              }`}
                              title="Dislike response"
                            >
                              <ThumbsDownIcon className="w-3.5 h-3.5" />
                            </button>

                            {/* Copy Text */}
                            <button 
                              type="button"
                              onClick={() => handleCopyText(msg.content, idx)}
                              className="flex items-center gap-1 px-2 py-1 rounded bg-white/5 hover:bg-white/10 hover:text-white transition-all text-[11px]"
                              title="Copy response body"
                            >
                              {copiedIndex === idx ? (
                                <>
                                  <CheckIcon className="w-3 h-3 text-[#34d399]" />
                                  <span className="text-[#34d399]">Copied</span>
                                </>
                              ) : (
                                <>
                                  <CopyIcon className="w-3 h-3" />
                                  <span>Copy</span>
                                </>
                              )}
                            </button>

                            {/* Listen (Read Aloud) */}
                            <button 
                              type="button"
                              onClick={() => handleSpeak(msg.content, idx)}
                              className="flex items-center gap-1 px-2 py-1 rounded bg-white/5 hover:bg-white/10 hover:text-white transition-all text-[11px]"
                              title="Listen (Read Aloud)"
                            >
                              <Volume2Icon className={`w-3.5 h-3.5 ${isSpeaking === idx ? 'text-[#00d4ff] animate-pulse' : ''}`} />
                              <span className={isSpeaking === idx ? 'text-[#00d4ff] font-medium' : ''}>{isSpeaking === idx ? 'Stop Speech' : 'Listen'}</span>
                            </button>

                            {/* Export Docs */}
                            <button 
                              type="button"
                              onClick={() => handleExportDocs(msg.content, idx)}
                              className="flex items-center gap-1 px-2 py-1 rounded bg-white/5 hover:bg-white/10 hover:text-white transition-all text-[11px]"
                              title="Export to Markdown Docs File"
                            >
                              <FileTextIcon className="w-3.5 h-3.5" />

                            </button>

                            <button

                              onClick={() => handleDraftGmail(msg.content)}

                            </button>

                            {/* Branch chat */}
                            <button 
                              type="button"
                              onClick={() => handleBranchChat(idx)}
                              className="flex items-center gap-1 px-2 py-1 rounded bg-white/5 hover:bg-white/10 hover:text-white transition-all text-[11px]"

                              <GitBranchIcon className="w-3.5 h-3.5" />

                        <div className={`text-[10px] text-[#4a5568] ${msg.role === 'user' ? 'text-right' : 'text-left'}`}>

                })}

                {isLoading && (
                  <div className="flex gap-3 max-w-[80%] mr-auto animate-pulse">

                      AI
                    </div>
                    <div className="space-y-1">
                      <div className="flex items-center gap-1 px-4 py-3 rounded-2xl bg-[#111827]/80 border border-white/5 rounded-tl-sm">
                        <span className="w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" style={{ animationDelay: '0ms' }} />
                        <span className="w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" style={{ animationDelay: '150ms' }} />
                        <span className="w-1.5 h-1.5 rounded-full bg-gray-500 animate-bounce" style={{ animationDelay: '300ms' }} />
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
            <div ref={chatEndRef} />
          </main>

          {/* INPUT CONTROLS */}
          <div className="py-4 border-t border-white/5 flex-shrink-0 relative z-10">
            <form onSubmit={handleSendMessage} className="relative bg-[#0d1520] border border-white/10 focus-within:border-[#00d4ff]/50 rounded-2xl p-2 transition-all">
              <textarea
                ref={textareaRef}
                rows="1"
                value={userInput}
                onChange={(e) => setUserInput(e.target.value)}
                onKeyDown={(e) => {
                  if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage(e);
                  }
                }}
                placeholder={`Send your query to ${agent.name}...`}
                className="w-full bg-transparent border-none outline-none resize-none text-[14.5px] text-[#f0f4f8] placeholder-gray-500 max-h-[180px] py-2 px-3 focus:ring-0 leading-relaxed font-sans"
                maxLength={8000}
              />

              <div className="flex items-center justify-between pt-1 border-t border-white/5 px-2 mt-1 text-[11px] text-[#4a5568]">
                <span className="font-medium font-mono text-[#8b9ab5]">
                  Active: <span style={{ color: agent.color }} className="font-bold">{agent.name}</span>
                </span>
                <div className="flex items-center gap-3">
                  <span className="font-mono">{userInput.length} / 8000</span>
                  <button
                    type="submit"
                    disabled={!userInput.trim() || isLoading}
                    className="flex items-center justify-center w-8 h-8 rounded-xl bg-[#00d4ff] text-[#0b0f19] hover:bg-[#33ddff] disabled:opacity-20 disabled:cursor-not-allowed transition-all"
                    style={{
                      backgroundColor: userInput.trim() ? agent.color : '',
                      color: '#0b0f19'
                    }}
                  >
                    <SendIcon className="w-4 h-4" />
                  </button>
                </div>
              </div>
            </form>
            <div className="flex items-center gap-1.5 mt-2.5 px-1 justify-center">
              <InfoIcon className="w-3.5 h-3.5 text-gray-600" />
              <span className="text-[10px] text-gray-500 text-center font-mono uppercase tracking-wider">
                Direct Client-side integration. Your chats never touch secondary servers.
              </span>
            </div>
          </div>

          {/* API CONFIG MODAL */}
          {isModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm animate-fadeIn">
              <div className="bg-[#111827] border border-white/10 rounded-2xl max-w-md w-full p-6 relative overflow-hidden glow-card">
                <button 
                  type="button"
                  onClick={() => setIsModalOpen(false)}
                  className="absolute top-4 right-4 text-gray-500 hover:text-white"
                >
                  <XIcon className="w-5 h-5" />
                </button>

                <h3 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                  <KeyIcon className="w-5 h-5 text-[#00d4ff]" />
                  Connect API Configuration
                </h3>
                
                <p className="text-xs text-[#8b9ab5] mb-4 leading-relaxed">
                  Choose your preferred LLM provider. Both options allow direct client-side requests from your browser with no intermediate servers.
                </p>

                <div className="space-y-4">
                  {/* Provider selector */}
                  <div className="space-y-1.5">
                    <label className="text-[10px] text-gray-400 font-mono uppercase tracking-wider block">API Provider</label>
                    <select
                      value={apiProvider}
                      onChange={(e) => {
                        setApiProvider(e.target.value);
                        setApiKey('');
                      }}
                      className="w-full bg-[#0d1520] border border-white/10 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-[#00d4ff]"
                    >
                      <option value="gemini">Google Gemini (Free Tier)</option>
                      <option value="openrouter">OpenRouter (Dozens of Free Models)</option>
                      <option value="groq">Groq Cloud (Blazing-Fast Speed)</option>
                      <option value="github">GitHub Models (Developer Hub)</option>
                    </select>
                  </div>

                  {/* Helpful Quick Tip Box for New Users */}
                  <div className="p-3 bg-[#162030]/40 border border-[#00d4ff]/10 rounded-xl flex items-start gap-2.5 text-xs text-[#8b9ab5] leading-relaxed animate-fadeIn">
                    <InfoIcon className="w-4 h-4 text-[#00d4ff] flex-shrink-0 mt-0.5" />
                    <div>
                      <span className="text-white font-medium">New to this? Start free</span> — OpenRouter has free models with no credit card required. Get your key at{" "}
                      <a 
                        href="https://openrouter.ai" 
                        target="_blank" 
                        rel="noopener noreferrer" 
                        className="text-[#00d4ff] hover:underline inline-flex items-center gap-0.5 font-semibold"
                      >
                        openrouter.ai <ExternalLinkIcon className="w-3 h-3 inline" />
                      </a>
                    </div>
                  </div>

                  {/* OpenRouter Model selection if selected */}
                  {apiProvider === 'openrouter' && (
                    <div className="space-y-1.5">
                      <label className="text-[10px] text-gray-400 font-mono uppercase tracking-wider block">Choose Free Model</label>
                      <select
                        value={openRouterModel}
                        onChange={(e) => setOpenRouterModel(e.target.value)}
                        className="w-full bg-[#0d1520] border border-white/10 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-[#00d4ff]"
                      >
                        {OPENROUTER_MODELS.map(m => (
                          <option key={m.id} value={m.id}>{m.name}</option>
                        ))}
                      </select>
                    </div>
                  )}

                  {/* Groq Model selection if selected */}
                  {apiProvider === 'groq' && (
                    <div className="space-y-1.5">
                      <label className="text-[10px] text-gray-400 font-mono uppercase tracking-wider block">Choose Groq Model</label>
                      <select
                        value={groqModel}
                        onChange={(e) => setGroqModel(e.target.value)}
                        className="w-full bg-[#0d1520] border border-white/10 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-[#00d4ff]"
                      >
                        {GROQ_MODELS.map(m => (
                          <option key={m.id} value={m.id}>{m.name}</option>
                        ))}
                      </select>
                    </div>
                  )}

                  {/* GitHub Models selection if selected */}
                  {apiProvider === 'github' && (
                    <div className="space-y-1.5">
                      <label className="text-[10px] text-gray-400 font-mono uppercase tracking-wider block">Choose Model</label>
                      <select
                        value={githubModel}
                        onChange={(e) => setGithubModel(e.target.value)}
                        className="w-full bg-[#0d1520] border border-white/10 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-[#00d4ff]"
                      >
                        {GITHUB_MODELS.map(m => (
                          <option key={m.id} value={m.id}>{m.name}</option>
                        ))}
                      </select>
                    </div>
                  )}

                  {/* Instructions trigger */}
                  <button
                    type="button"
                    onClick={() => setIsGuideOpen(!isGuideOpen)}
                    className="w-full text-left p-2.5 bg-white/5 border border-white/5 hover:border-[#00d4ff]/30 rounded-xl text-xs text-[#00d4ff] font-medium flex items-center justify-between"
                  >
                    <span>How to get a key?</span>
                    <ChevronDownIcon className={`w-4 h-4 transition-transform ${isGuideOpen ? 'rotate-180' : ''}`} />
                  </button>

                  {isGuideOpen && (
                    <div className="p-3 bg-[#0d1520] border border-white/5 rounded-xl space-y-2 text-xs text-[#8b9ab5] leading-relaxed max-h-[160px] overflow-y-auto">
                      {apiProvider === 'gemini' && (
                        <React.Fragment>
                          <p>1. Go to <a href="https://aistudio.google.com" target="_blank" rel="noopener noreferrer" className="text-[#00d4ff] hover:underline inline-flex items-center gap-0.5 font-bold">Google AI Studio <ExternalLinkIcon className="w-3 h-3" /></a></p>
                          <p>2. Select <strong className="text-white">"Get API Key"</strong> and generate a free API key.</p>
                          <p>3. Key starts with <code className="text-white bg-white/10 px-1 py-0.5 rounded font-mono">AIzaSy</code>.</p>
                        </React.Fragment>
                      )}
                      {apiProvider === 'openrouter' && (
                        <React.Fragment>
                          <p>1. Go to <a href="https://openrouter.ai" target="_blank" rel="noopener noreferrer" className="text-[#00d4ff] hover:underline inline-flex items-center gap-0.5 font-bold">OpenRouter.ai <ExternalLinkIcon className="w-3 h-3" /></a></p>
                          <p>2. Sign up, navigate to Keys, and click <strong className="text-white">"Create Key"</strong>.</p>
                          <p>3. Key starts with <code className="text-white bg-white/10 px-1 py-0.5 rounded font-mono">sk-or-</code>.</p>
                        </React.Fragment>
                      )}
                      {apiProvider === 'groq' && (
                        <React.Fragment>
                          <p>1. Go to <a href="https://console.groq.com" target="_blank" rel="noopener noreferrer" className="text-[#00d4ff] hover:underline inline-flex items-center gap-0.5 font-bold">Groq Console <ExternalLinkIcon className="w-3 h-3" /></a></p>
                          <p>2. Go to **API Keys**, and click <strong className="text-white">"Create API Key"</strong>.</p>
                          <p>3. Key starts with <code className="text-white bg-white/10 px-1 py-0.5 rounded font-mono">gsk_</code>.</p>
                        </React.Fragment>
                      )}
                      {apiProvider === 'github' && (
                        <React.Fragment>
                          <p>1. Go to your <a href="https://github.com/settings/tokens" target="_blank" rel="noopener noreferrer" className="text-[#00d4ff] hover:underline inline-flex items-center gap-0.5 font-bold">GitHub Personal Tokens Settings <ExternalLinkIcon className="w-3 h-3" /></a></p>
                          <p>2. Create a classic or fine-grained **Personal Access Token (PAT)**.</p>
                          <p>3. Ensure you check or authorize the <strong className="text-white">"models:read"</strong> (or "models") permission.</p>
                          <p>4. Your key will typically start with <code className="text-white bg-white/10 px-1 py-0.5 rounded font-mono">github_pat_</code> or <code className="text-white bg-white/10 px-1 py-0.5 rounded font-mono">ghp_</code>.</p>
                        </React.Fragment>
                      )}
                    </div>
                  )}

                  {/* API Key Input */}
                  <div className="space-y-1.5">
                    <label className="text-[10px] text-gray-400 font-mono uppercase tracking-wider block font-bold">
                      {apiProvider === 'gemini' && 'Gemini API Key'}
                      {apiProvider === 'openrouter' && 'OpenRouter API Key'}
                      {apiProvider === 'groq' && 'Groq API Key'}
                      {apiProvider === 'github' && 'GitHub PAT'}
                    </label>
                    <input
                      type="password"
                      placeholder={
                        apiProvider === 'gemini' ? 'AIzaSy...' :
                        apiProvider === 'openrouter' ? 'sk-or-...' :
                        apiProvider === 'groq' ? 'gsk_...' : 'github_pat_...'
                      }
                      value={apiKey}
                      onChange={(e) => setApiKey(e.target.value)}
                      className="w-full bg-[#0d1520] border border-white/10 focus:border-[#00d4ff] rounded-xl px-3 py-2 text-sm text-white font-mono placeholder-gray-600 outline-none transition-colors"
                    />
                  </div>

                  {isConnected && (
                    <div className="flex items-center justify-between text-xs py-1.5 px-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-[#34d399] font-mono">
                      <span>Connection configuration active</span>
                      <button 
                        type="button" 
                        onClick={handleClearConfig}
                        className="text-red-400 hover:text-red-300 underline font-sans font-bold"
                      >
                        Disconnect
                      </button>
                    </div>
                  )}

                  <div className="flex gap-2 pt-2">
                    <button
                      type="button"
                      onClick={() => setIsModalOpen(false)}
                      className="flex-1 py-2 bg-white/5 hover:bg-white/10 text-xs font-semibold rounded-xl text-gray-300 border border-white/5"
                    >
                      Close
                    </button>
                    <button
                      type="button"
                      onClick={handleSaveConfig}
                      className="flex-1 py-2 bg-[#00d4ff] hover:bg-[#33ddff] text-[#0b0f19] text-xs font-semibold rounded-xl"
                    >
                      Save Configuration
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
